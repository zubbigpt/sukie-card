<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Iniciar sesión – ZubCard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f8f6f2 0%, #f0ebe3 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1714;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #c8a84b;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      background: white;
    }

    input:focus {
      border-color: #1a1714;
    }

    .btn-primary {
      width: 100%;
      background: #1a1714;
      color: #FFF5B6;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(26, 23, 20, 0.2);
    }

    .btn-google {
      width: 100%;
      background: white;
      color: #333;
      border: 1.5px solid #e0e0e0;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-google:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .divider {
      text-align: center;
      color: #ccc;
      font-size: 0.8rem;
      margin: 16px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .link {
      text-align: center;
      font-size: 0.83rem;
      color: #888;
      margin-top: 20px;
    }

    .link a {
      color: #1a1714;
      font-weight: 600;
      text-decoration: none;
    }

    .error {
      background: #fff0f0;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      border: 1px solid #f5c6c6;
    }

    .input-group {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Zub<span>Card</span></div>
    <div class="subtitle">Panel de administración para negocios</div>

    <div class="error" id="err"></div>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
      </svg>
      Continuar con Google
    </button>

    <div class="divider">o con email</div>

    <div class="input-group">
      <label>Email del negocio</label>
      <input type="email" id="email" placeholder="tu@negocio.com">
    </div>

    <div class="input-group">
      <label>PIN de administrador</label>
      <input type="password" id="pin" placeholder="4 dígitos" maxlength="4" onkeypress="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-primary" onclick="doLogin()">Entrar →</button>

    <div class="link">¿No tienes cuenta? <a href="/app/register">Regístrate gratis</a></div>
  </div>

  <script>
    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pin = document.getElementById('pin').value.trim();
      const err = document.getElementById('err');

      if (!email || !pin) {
        err.textContent = 'Completa todos los campos';
        err.style.display = 'block';
        return;
      }

      try {
        const r = await fetch('/api/app/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, pin })
        });
        const d = await r.json();
        if (r.ok) {
          // Save PIN to sessionStorage before redirecting
          if (d.slug) {
            sessionStorage.setItem('zubcard_pin_' + d.slug, pin);
          }
          window.location.href = d.dashboard_url;
        } else {
          err.textContent = d.detail || 'Error al iniciar sesión';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Error de conexión';
        err.style.display = 'block';
      }
    }

    function googleLogin() {
      alert('Google OAuth estará disponible pronto. Por ahora usa email + PIN.');
    }
  </script>
</body>
</html>
