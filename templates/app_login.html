<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Iniciar sesión – ZubCard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: #fff8f5;
      --surface-low: #fff1ea;
      --surface-mid: #ffeade;
      --primary: #26170c;
      --primary-mid: #3d2b1f;
      --on-primary: #ffffff;
      --honey: #ffca48;
      --honey-dark: #785a00;
      --honey-light: #fff3d0;
      --outline: #a08d83;
      --outline-var: #e2cfc8;
      --red: #c62828;
      --r-sm: 0.375rem;
      --r-lg: 1.25rem;
      --shadow-sm: 0 2px 12px rgba(38,23,12,0.06);
      --shadow-lg: 0 8px 40px rgba(38,23,12,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-mid) 100%);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--on-primary);
      border-radius: var(--r-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .brand { margin-bottom: 32px; }
    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      color: var(--primary);
      letter-spacing: .5px;
      line-height: 1;
    }
    .brand-logo span { color: var(--honey-dark); }
    .brand-sub { color: var(--outline); font-size: 0.87rem; margin-top: 5px; font-weight: 500; }

    .error {
      background: #fbe9e7;
      color: var(--red);
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 0.84rem;
      margin-bottom: 18px;
      display: none;
      border-left: 3px solid var(--red);
    }

    .btn-google {
      width: 100%;
      background: var(--on-primary);
      color: var(--primary);
      border: none;
      box-shadow: inset 0 0 0 1.5px var(--outline-var);
      padding: 12px;
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: box-shadow 0.18s;
      margin-bottom: 18px;
      font-family: 'Manrope', sans-serif;
    }
    .btn-google:hover { box-shadow: inset 0 0 0 1.5px var(--outline), var(--shadow-sm); }

    .divider {
      text-align: center;
      color: var(--outline-var);
      font-size: 0.78rem;
      margin: 16px 0;
      position: relative;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--outline-var);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .input-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--outline);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 0.94rem;
      outline: none;
      transition: box-shadow 0.18s;
      background: var(--surface);
      color: var(--primary);
      font-family: 'Manrope', sans-serif;
    }
    input:focus { box-shadow: 0 0 0 2.5px var(--honey), var(--shadow-sm); }
    input::placeholder { color: var(--outline); }

    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      padding: 14px;
      border-radius: var(--r-sm);
      font-size: 0.93rem;
      font-weight: 800;
      letter-spacing: .5px;
      cursor: pointer;
      margin-top: 20px;
      margin-bottom: 12px;
      transition: background 0.18s;
      font-family: 'Manrope', sans-serif;
    }
    .btn-primary:hover { background: var(--primary-mid); }

    .link {
      text-align: center;
      font-size: 0.83rem;
      color: var(--outline);
      margin-top: 18px;
    }
    .link a { color: var(--primary); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-logo">Zub<span>Card</span></div>
      <div class="brand-sub">Panel de administración para negocios</div>
    </div>

    <div class="error" id="err"></div>

    <div class="input-group">
      <label>Email del negocio</label>
      <input type="email" id="email" placeholder="tu@negocio.com">
    </div>

    <div class="input-group">
      <label>PIN de administrador</label>
      <input type="password" id="pin" placeholder="4 dígitos" maxlength="4" onkeypress="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-primary" onclick="doLogin()">Entrar →</button>

    <div class="divider">o</div>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>

    <div class="link">¿No tienes cuenta? <a href="/app/register">Regístrate gratis</a></div>
  </div>

  <script>
    // Show Google error if redirected back with error
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      const err = document.getElementById('err');
      err.textContent = 'No se pudo iniciar sesión con Google. Inténtalo de nuevo.';
      err.style.display = 'block';
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pin = document.getElementById('pin').value.trim();
      const err = document.getElementById('err');

      if (!email || !pin) {
        err.textContent = 'Completa todos los campos';
        err.style.display = 'block';
        return;
      }

      try {
        const r = await fetch('/api/app/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, pin })
        });
        const d = await r.json();
        if (r.ok) {
          // Save PIN to sessionStorage before redirecting
          if (d.slug) {
            sessionStorage.setItem('zubcard_pin_' + d.slug, pin);
          }
          window.location.href = d.dashboard_url;
        } else {
          err.textContent = d.detail || 'Error al iniciar sesión';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Error de conexión';
        err.style.display = 'block';
      }
    }

    function googleLogin() {
      window.location.href = '/auth/google';
    }
  </script>
</body>
</html>
