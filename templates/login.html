<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder — ZubCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.corner{position:fixed;width:20px;height:20px;border-color:#0a0a0a;border-style:solid}
.tl{top:20px;left:20px;border-width:2px 0 0 2px}
.tr{top:20px;right:20px;border-width:2px 2px 0 0}
.bl{bottom:20px;left:20px;border-width:0 0 2px 2px}
.br{bottom:20px;right:20px;border-width:0 2px 2px 0}
.wrap{width:100%;max-width:400px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#0a0a0a;margin-bottom:3rem;display:flex;align-items:center;gap:.6rem}
.brand-dot{width:8px;height:8px;background:#00e676;border-radius:50%;display:inline-block}
.card{background:#fff;border:1.5px solid #0a0a0a;padding:2.5rem 2rem;box-shadow:5px 5px 0 #0a0a0a}
.eyebrow{font-size:.62rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:.75rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:.9;letter-spacing:-1px;color:#0a0a0a;margin-bottom:.5rem}
.sub{font-size:.85rem;color:#888;margin-bottom:2rem;line-height:1.6}
label{display:block;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:.5rem}
input[type=text], input[type=password]{
  width:100%;padding:.85rem 1rem;
  border:1.5px solid #d5d5cc;border-radius:1px;
  font-size:1rem;
  font-family:'Plus Jakarta Sans',sans-serif;color:#0a0a0a;
  background:#f5f5f0;outline:none;transition:border .15s;
  margin-bottom:1.25rem;
}
input[type=text]:focus, input[type=password]:focus{border-color:#0a0a0a}
input[type=password]{
  font-size:1.8rem;text-align:center;letter-spacing:8px;
  font-family:'Bebas Neue',sans-serif;
}
input[type=password]::placeholder{letter-spacing:4px;font-size:1.2rem;color:#ccc}
button{
  width:100%;padding:.85rem;
  background:#0a0a0a;color:#fff;
  border:1.5px solid #0a0a0a;border-radius:1px;
  font-size:.78rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .15s;
  margin-top:.25rem;
}
button:hover:not(:disabled){background:#333}
button:disabled{opacity:.5;cursor:not-allowed}
.error{
  display:none;
  background:#fff0f0;border:1.5px solid #ff4444;
  padding:.75rem 1rem;
  font-size:.8rem;color:#cc0000;font-weight:600;
  margin-top:1rem;text-align:center;
}
.error.show{display:block}
.footer-note{margin-top:1.5rem;font-size:.72rem;color:#ccc;text-align:center;letter-spacing:.5px}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:.5rem}
</style>
</head>
<body>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="wrap">
  <div class="brand"><span class="brand-dot"></span> ZUBCARD</div>
  <div class="card">
    <div class="eyebrow">Panel de negocio</div>
    <h1>ACCEDER.</h1>
    <p class="sub">Introduce el identificador de tu negocio y tu PIN de administrador.</p>

    <label for="slug-input">Identificador del negocio</label>
    <input type="text" id="slug-input" placeholder="ej: sukiecookie" autocomplete="off" autocapitalize="none" spellcheck="false">

    <label for="pin-input">PIN de administrador</label>
    <input type="password" id="pin-input" placeholder="····" maxlength="8">

    <button id="login-btn" onclick="doLogin()">
      <span class="btn-inner">
        <span id="btn-text">Entrar →</span>
        <span class="spinner" id="spinner"></span>
      </span>
    </button>
    <div class="error" id="error-msg">PIN o negocio incorrecto. Inténtalo de nuevo.</div>
  </div>
  <p class="footer-note">ZubCard · Fidelización digital para hostelería</p>
</div>

<script>
  // Allow Enter key to submit
  document.addEventListener('keydown', function(e){
    if(e.key === 'Enter') doLogin();
  });

  // Auto-focus slug field
  document.getElementById('slug-input').focus();

  // If slug is pre-filled via URL param ?slug=xxx
  const params = new URLSearchParams(window.location.search);
  if(params.get('slug')) {
    document.getElementById('slug-input').value = params.get('slug');
    document.getElementById('pin-input').focus();
  }

  async function doLogin() {
    const slug = document.getElementById('slug-input').value.trim().toLowerCase();
    const pin  = document.getElementById('pin-input').value.trim();
    const btn  = document.getElementById('login-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const errorEl = document.getElementById('error-msg');

    if (!slug || !pin) {
      errorEl.textContent = 'Por favor introduce el identificador y el PIN.';
      errorEl.classList.add('show');
      return;
    }

    // Show loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Verificando...';
    errorEl.classList.remove('show');

    try {
      const res = await fetch(`/api/biz/${encodeURIComponent(slug)}/verify-pin?pin=${encodeURIComponent(pin)}`);
      if (res.ok) {
        const data = await res.json();
        if (data.status === 'ok' && data.role === 'admin') {
          // Store slug in sessionStorage for convenience
          sessionStorage.setItem('zub_slug', slug);
          // Redirect to dashboard
          window.location.href = `/biz/${encodeURIComponent(slug)}/dashboard`;
          return;
        } else if (data.role === 'employee') {
          // Employee PIN → redirect to scanner
          window.location.href = `/biz/${encodeURIComponent(slug)}/scanner`;
          return;
        }
      }
      // Any non-ok or unexpected response
      throw new Error('invalid');
    } catch(e) {
      errorEl.textContent = 'Negocio o PIN incorrecto. Inténtalo de nuevo.';
      errorEl.classList.add('show');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Entrar →';
    }
  }
</script>
</body>
</html>
