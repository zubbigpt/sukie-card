<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ business_name }} — Caja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: {{ primary_color }};
      --cream: {{ accent_color }};
      --gold:  #e8d9a0;
      --light: #9a8f7e;
    }
    body { background: var(--cream); font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .top-bar { width: 100%; background: var(--brown); color: var(--cream); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar .logo-txt { font-family: 'Playfair Display', serif; font-size: 18px; }
    .top-bar .badge { font-size: 11px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; padding: 4px 10px; }
    .wrapper { width: 100%; max-width: 440px; padding: 20px 16px 60px; flex: 1; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 6px 24px rgba(0,0,0,0.10); overflow: hidden; margin-bottom: 16px; }
    .card-head { background: var(--cream); padding: 20px 24px 14px; text-align: center; border-bottom: 2px dashed var(--gold); }
    .card-head h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--brown); }
    .card-head p { font-size: 13px; color: var(--light); margin-top: 2px; }
    .card-body { padding: 20px 24px; }
    .pin-wrap { text-align: center; padding-top: 30px; }
    .pin-wrap .icon { font-size: 52px; margin-bottom: 12px; }
    .pin-wrap h2 { font-family: 'Playfair Display', serif; color: var(--brown); font-size: 24px; margin-bottom: 4px; }
    .pin-wrap p { color: var(--light); font-size: 14px; margin-bottom: 28px; }
    input[type=password] { width: 100%; padding: 14px 16px; border: 2px solid var(--gold); border-radius: 12px; font-size: 22px; font-family: 'Nunito', sans-serif; color: var(--brown); background: var(--cream); text-align: center; letter-spacing: 6px; outline: none; transition: border-color 0.2s; margin-bottom: 14px; }
    input[type=password]:focus { border-color: var(--brown); }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 50px; font-size: 17px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.18s; margin-bottom: 10px; }
    .btn-primary { background: var(--brown); color: var(--cream); }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-reward { background: linear-gradient(135deg, #d4a017, #e8c840); color: var(--brown); }
    .btn-ghost { background: transparent; color: var(--light); font-size: 15px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .cam-wrap { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #111; aspect-ratio: 1; margin-bottom: 16px; }
    #cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .cam-frame { width: 62%; aspect-ratio: 1; border: 3px solid rgba(255,255,255,0.9); border-radius: 16px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.42); }
    .cam-pulse { position: absolute; width: 62%; aspect-ratio: 1; border-radius: 16px; border: 2px solid #fff; animation: camPulse 1.6s ease-in-out infinite; }
    @keyframes camPulse { 0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)} }
    #scan-status { text-align: center; font-size: 14px; color: var(--light); min-height: 22px; margin-bottom: 8px; }
    #scan-status.ok  { color: #27ae60; font-weight: 700; }
    #scan-status.err { color: #c0392b; font-weight: 700; }
    .customer-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .customer-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--brown); color: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .customer-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown); }
    .customer-sub { font-size: 13px; color: var(--light); }
    .stamps-mini { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .sm-dot { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid var(--gold); background: var(--cream); }
    .sm-dot.filled { background: var(--brown); border-color: var(--brown); color: var(--cream); }
    .sm-dot.empty { color: var(--gold); }
    .tier-badge { display: inline-block; font-size: 12px; font-weight: 800; border-radius: 50px; padding: 3px 10px; margin-bottom: 8px; }
    .tier-bronze { background: #cd7f32; color: #fff; }
    .tier-silver { background: #c0c0c0; color: #333; }
    .tier-gold   { background: linear-gradient(135deg,#d4a017,#f0d060); color: #3A3426; }
    .award-pill { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg,#d4a017,#e8c840); color: var(--brown); font-size: 13px; font-weight: 800; border-radius: 50px; padding: 5px 14px; margin-bottom: 10px; }
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
    .mode-tab { flex: 1; padding: 10px; border: 2px solid var(--gold); border-radius: 12px; background: var(--cream); font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; color: var(--light); cursor: pointer; text-align: center; transition: all 0.18s; }
    .mode-tab.active { border-color: var(--brown); background: var(--brown); color: var(--cream); }
    .stepper { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .stepper-btn { width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--gold); background: var(--cream); font-size: 28px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stepper-btn:hover { border-color: var(--brown); background: var(--brown); color: var(--cream); }
    .stepper-btn:active { transform: scale(0.92); }
    #quick-count { flex: 1; font-size: 44px; font-weight: 800; color: var(--brown); text-align: center; padding: 10px 0; border: 2px solid var(--gold); border-radius: 12px; background: var(--cream); }
    #mode-quick label { display: block; font-size: 13px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
    .products-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .product-row { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border: 2px solid var(--gold); border-radius: 14px; padding: 10px 14px; }
    .product-info { flex: 1; }
    .product-name { font-size: 14px; font-weight: 700; color: var(--brown); }
    .product-sub  { font-size: 12px; color: var(--light); }
    .product-ctrl { display: flex; align-items: center; gap: 10px; }
    .p-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gold); background: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .p-btn:hover { border-color: var(--brown); background: var(--brown); color: var(--cream); }
    .p-btn:active { transform: scale(0.9); }
    .p-qty { font-size: 18px; font-weight: 800; color: var(--brown); min-width: 24px; text-align: center; }
    .total-row { display: flex; justify-content: space-between; align-items: center; background: var(--brown); color: var(--cream); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; }
    .total-row .lbl { font-size: 14px; opacity: 0.8; }
    .total-row .val { font-size: 22px; font-weight: 800; }
    .success-wrap { text-align: center; padding: 30px 0; }
    .success-wrap .big-icon { font-size: 72px; margin-bottom: 12px; }
    .success-wrap h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--brown); margin-bottom: 6px; }
    .success-wrap p { font-size: 15px; color: var(--light); margin-bottom: 4px; }
    .reward-alert { background: linear-gradient(135deg,#d4a017,#e8c840); color: var(--brown); border-radius: 14px; padding: 14px; margin: 16px 0; font-weight: 700; font-size: 15px; }
    .err-msg { color: #c0392b; font-size: 13px; text-align: center; display: none; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="top-bar">
  <span class="logo-txt">🍪 {{ business_name }}</span>
  <span class="badge">Caja</span>
</div>
<div class="wrapper">

  <!-- SCREEN 1: PIN -->
  <div class="screen active" id="screen-pin">
    <div class="pin-wrap">
      <div class="icon">🔐</div>
      <h2>Acceso de caja</h2>
      <p>Introduce el PIN para comenzar</p>
    </div>
    <div class="err-msg" id="pin-error">PIN incorrecto. Inténtalo de nuevo.</div>
    <input type="password" id="pin-input" placeholder="••••" maxlength="8">
    <button class="btn btn-primary" onclick="doLogin()">Entrar →</button>
  </div>

  <!-- SCREEN 2: CAMERA -->
  <div class="screen" id="screen-camera">
    <div class="card">
      <div class="card-head">
        <h2>📷 Escanear tarjeta cliente</h2>
        <p>Apunta la cámara al QR del cliente</p>
      </div>
      <div class="card-body" style="padding:16px;">
        <div class="cam-wrap">
          <video id="cam-video" autoplay playsinline muted></video>
          <canvas id="cam-canvas" style="display:none;"></canvas>
          <div class="cam-overlay">
            <div class="cam-pulse"></div>
            <div class="cam-frame"></div>
          </div>
        </div>
        <p id="scan-status">Buscando QR…</p>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="logout()">← Cerrar sesión</button>
  </div>

  <!-- SCREEN 3: STAMP -->
  <div class="screen" id="screen-stamp">
    <div class="card">
      <div class="card-body">
        <div class="customer-row">
          <div class="customer-avatar" id="cust-avatar">🍪</div>
          <div>
            <div class="customer-name" id="cust-name">—</div>
            <div class="customer-sub"  id="cust-sub">—</div>
          </div>
        </div>
        <div id="tier-badge-wrap"></div>
        <div id="award-wrap"></div>
        <div class="stamps-mini" id="stamps-mini"></div>
      </div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-quick"    onclick="setMode('quick')">⚡ Sello rápido</button>
      <button class="mode-tab"        id="tab-purchase" onclick="setMode('purchase')">🛍 Modo compra</button>
    </div>
    <!-- Quick mode -->
    <div id="mode-quick">
      <div class="card">
        <div class="card-body">
          <label>¿Cuántas cookies compró?</label>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepQuick(-1)">−</button>
            <div id="quick-count">1</div>
            <button class="stepper-btn" onclick="stepQuick(+1)">+</button>
          </div>
          <div class="err-msg" id="quick-error"></div>
          <button class="btn btn-primary" id="quick-add-btn" onclick="submitStamps('quick')">
            ✅ Añadir <span id="quick-label">1 sello</span>
          </button>
          <div id="redeem-wrap-quick"></div>
          <button class="btn btn-ghost" onclick="goBackToScanner()">📷 Escanear otro cliente</button>
        </div>
      </div>
    </div>
    <!-- Purchase mode -->
    <div id="mode-purchase" style="display:none;">
      <div class="card">
        <div class="card-body">
          <div class="products-grid" id="products-grid"></div>
          <div class="total-row">
            <span class="lbl">Total sellos</span>
            <span class="val" id="purchase-total">0</span>
          </div>
          <div class="err-msg" id="purchase-error"></div>
          <button class="btn btn-primary" id="purchase-add-btn" onclick="submitStamps('purchase')">✅ Confirmar compra</button>
          <div id="redeem-wrap-purchase"></div>
          <button class="btn btn-ghost" onclick="goBackToScanner()">📷 Escanear otro cliente</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: SUCCESS -->
  <div class="screen" id="screen-success">
    <div class="card">
      <div class="card-body">
        <div class="success-wrap">
          <div class="big-icon" id="success-icon">🍪</div>
          <h2 id="success-title">¡Hecho!</h2>
          <p id="success-name"></p>
          <p id="success-detail"></p>
          <div id="success-reward" style="display:none;" class="reward-alert"></div>
        </div>
        <button class="btn btn-primary" onclick="goBackToScanner()">📷 Siguiente cliente</button>
        <button class="btn btn-ghost"   onclick="logout()">← Cerrar sesión</button>
      </div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const SLUG        = "{{ slug }}";
const BIZ_NAME    = "{{ business_name }}";
const BASE_URL    = "{{ base_url }}";
const DEFAULT_SPR = {{ stamps_per_reward }};

let adminPin = "", currentCardId = "", currentCard = null;
let scanActive = false, videoStream = null, quickCount = 1;

const PRODUCTS = [
  { id:"cookie",  name:"Cookie individual", sub:"1 sello por unidad", stamps:1 },
  { id:"box6",    name:"Caja 6 galletas",   sub:"6 sellos",           stamps:6 },
  { id:"box12",   name:"Caja 12 galletas",  sub:"12 sellos",          stamps:12 },
  { id:"brownie", name:"Brownie",           sub:"1 sello por unidad", stamps:1 },
];
let productQty = {};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// PIN LOGIN — validates against this business's slug
async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;
  const errEl = document.getElementById('pin-error');
  try {
    const resp = await fetch(`/api/biz/${SLUG}/verify-pin?pin=${encodeURIComponent(pin)}`);
    if (resp.status === 403 || resp.status === 404) {
      errEl.style.display = 'block';
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-input').focus();
      return;
    }
    adminPin = pin; errEl.style.display = 'none';
    startCamera();
  } catch(e) {
    errEl.textContent = 'Error de red. Inténtalo de nuevo.';
    errEl.style.display = 'block';
  }
}

function logout() {
  stopCamera(); adminPin = ""; currentCardId = ""; currentCard = null;
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').style.display = 'none';
  showScreen('pin');
}

// CAMERA
async function startCamera() {
  showScreen('camera');
  const st = document.getElementById('scan-status');
  st.textContent = 'Iniciando cámara…'; st.className = '';
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ ideal:'environment' }, width:{ ideal:1280 } }
    });
    const v = document.getElementById('cam-video');
    v.srcObject = videoStream; await v.play();
    scanActive = true; st.textContent = 'Buscando QR…';
    requestAnimationFrame(scanFrame);
  } catch(e) {
    st.textContent = '⚠ Sin acceso a la cámara. Revisa los permisos.'; st.className = 'err';
  }
}
function stopCamera() {
  scanActive = false;
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}
function scanFrame() {
  if (!scanActive) return;
  const v = document.getElementById('cam-video'), c = document.getElementById('cam-canvas');
  if (v.readyState < v.HAVE_ENOUGH_DATA) { requestAnimationFrame(scanFrame); return; }
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0);
  const img = ctx.getImageData(0, 0, c.width, c.height);
  const code = jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
  if (code) {
    const id = code.data.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
    if (id) { scanActive = false; stopCamera(); loadCustomer(id[0]); return; }
  }
  requestAnimationFrame(scanFrame);
}

// LOAD CUSTOMER
async function loadCustomer(cardId) {
  const st = document.getElementById('scan-status');
  st.textContent = 'Cargando datos…'; st.className = 'ok';
  try {
    const r = await fetch(`/api/cards/${cardId}`);
    if (!r.ok) throw new Error();
    currentCard = await r.json(); currentCardId = cardId;
    renderCustomer(); showScreen('stamp');
  } catch(e) {
    st.textContent = '⚠ Tarjeta no encontrada. Inténtalo de nuevo.'; st.className = 'err';
    scanActive = true; await startCamera();
  }
}

function getSPR() { return (currentCard && currentCard.stampsOnCard) ? currentCard.stampsOnCard : DEFAULT_SPR; }

function renderCustomer() {
  const c = currentCard, spr = getSPR();
  const hasAward = (c.awardBalance || 0) > 0;
  document.getElementById('cust-name').textContent = c.name || ((c.firstName||'') + ' ' + (c.lastName||'')).trim();
  document.getElementById('cust-sub').textContent  = `${c.stamps} / ${spr} sellos · ${c.totalStamps} totales`;
  document.getElementById('cust-avatar').textContent = hasAward ? '🎁' : '🍪';
  const tier = c.tier || 'bronze';
  const tierLabel = { bronze:'🥉 Bronce', silver:'🥈 Plata', gold:'🥇 Oro' };
  document.getElementById('tier-badge-wrap').innerHTML = `<span class="tier-badge tier-${tier}">${tierLabel[tier]||tier}</span>`;
  const aw = document.getElementById('award-wrap');
  aw.innerHTML = hasAward ? `<div class="award-pill">🎉 ${c.awardBalance} premio${c.awardBalance>1?'s':''} disponible${c.awardBalance>1?'s':''}</div>` : '';
  const grid = document.getElementById('stamps-mini'); grid.innerHTML = '';
  for (let i = 0; i < spr; i++) {
    const d = document.createElement('div');
    d.className = 'sm-dot ' + (i < c.stamps ? 'filled' : 'empty');
    d.textContent = i < c.stamps ? '🍪' : '○';
    grid.appendChild(d);
  }
  quickCount = 1; updateQuickDisplay(); resetProducts(); renderRedeemButtons();
}

function setMode(mode) {
  document.getElementById('tab-quick').classList.toggle('active', mode==='quick');
  document.getElementById('tab-purchase').classList.toggle('active', mode==='purchase');
  document.getElementById('mode-quick').style.display    = mode==='quick'    ? 'block' : 'none';
  document.getElementById('mode-purchase').style.display = mode==='purchase' ? 'block' : 'none';
}

function stepQuick(d) { quickCount = Math.max(1, Math.min(50, quickCount+d)); updateQuickDisplay(); }
function updateQuickDisplay() {
  document.getElementById('quick-count').textContent = quickCount;
  const l = document.getElementById('quick-label');
  if (l) l.textContent = quickCount===1 ? '1 sello' : `${quickCount} sellos`;
}

function resetProducts() { PRODUCTS.forEach(p => { productQty[p.id]=0; }); renderProducts(); }
function renderProducts() {
  const g = document.getElementById('products-grid'); g.innerHTML = '';
  PRODUCTS.forEach(p => {
    const r = document.createElement('div'); r.className = 'product-row';
    r.innerHTML = `<div class="product-info"><div class="product-name">${p.name}</div><div class="product-sub">${p.sub}</div></div>
      <div class="product-ctrl"><button class="p-btn" onclick="stepP('${p.id}',-1)">−</button>
      <span class="p-qty" id="qty-${p.id}">0</span>
      <button class="p-btn" onclick="stepP('${p.id}',+1)">+</button></div>`;
    g.appendChild(r);
  }); updatePTotal();
}
function stepP(id,d) { productQty[id]=Math.max(0,(productQty[id]||0)+d); document.getElementById(`qty-${id}`).textContent=productQty[id]; updatePTotal(); }
function updatePTotal() { let t=0; PRODUCTS.forEach(p=>{t+=(productQty[p.id]||0)*p.stamps;}); document.getElementById('purchase-total').textContent=t; }
function getPTotal() { let t=0; PRODUCTS.forEach(p=>{t+=(productQty[p.id]||0)*p.stamps;}); return t; }
function getPNote()  { return PRODUCTS.filter(p=>productQty[p.id]>0).map(p=>`${p.name} ×${productQty[p.id]}`).join(', '); }

function renderRedeemButtons() {
  ['quick','purchase'].forEach(mode => {
    const w = document.getElementById(`redeem-wrap-${mode}`);
    const n = (currentCard && currentCard.awardBalance) || 0;
    w.innerHTML = n > 0 ? `<button class="btn btn-reward" onclick="redeemReward()">🎁 Canjear galleta gratis${n>1?' ('+n+' disponibles)':''}</button>` : '';
  });
}
async function redeemReward() {
  const n = (currentCard&&currentCard.awardBalance)||0;
  const name = currentCard.name||(currentCard.firstName||'');
  if (!confirm(`¿Canjear 1 galleta gratis para ${name}? (${n} disponible${n>1?'s':''})`)) return;
  try {
    const r = await fetch(`/api/cards/${currentCardId}/redeem`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:adminPin})});
    const d = await r.json();
    document.getElementById('success-icon').textContent='🎁';
    document.getElementById('success-title').textContent='¡Premio canjeado!';
    document.getElementById('success-name').textContent=name;
    document.getElementById('success-detail').textContent=`Premios restantes: ${d.award_balance}`;
    document.getElementById('success-reward').style.display='none';
    showScreen('success');
  } catch(e) { alert('Error al canjear.'); }
}

async function submitStamps(mode) {
  let stamps, note;
  if (mode==='quick') { stamps=quickCount; note=`Venta: ${stamps} cookie${stamps>1?'s':''}`; }
  else { stamps=getPTotal(); note=getPNote(); if(!stamps){const e=document.getElementById('purchase-error');e.textContent='Añade al menos un producto.';e.style.display='block';return;} }
  const btnId=mode==='quick'?'quick-add-btn':'purchase-add-btn';
  const btn=document.getElementById(btnId); btn.disabled=true; btn.textContent='Añadiendo…';
  try {
    const r = await fetch(`/api/cards/${currentCardId}/stamps`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:adminPin, stamps:stamps, note:note, store:BIZ_NAME})});
    const d = await r.json();
    if (r.status===403) { alert('PIN incorrecto. Cerrando sesión.'); logout(); return; }
    const spr=getSPR(), name=currentCard.name||(currentCard.firstName||'');
    document.getElementById('success-icon').textContent='🍪';
    document.getElementById('success-title').textContent='¡Hecho!';
    document.getElementById('success-name').textContent=name;
    document.getElementById('success-detail').textContent=`+${stamps} sello${stamps>1?'s':''} añadido${stamps>1?'s':''}. Total: ${d.stamps} / ${spr}`;
    const aw=(d.award_balance||0), ar=document.getElementById('success-reward');
    if(aw>0){ar.innerHTML=`🎉 ¡Premio desbloqueado! ${name} tiene ${aw} galleta${aw>1?'s':''} gratis.`;ar.style.display='block';}
    else{ar.style.display='none';}
    showScreen('success');
  } catch(e) { btn.disabled=false; btn.textContent=mode==='quick'?'✅ Añadir sellos':'✅ Confirmar compra'; alert('Error de red.'); }
}

function goBackToScanner() {
  currentCardId=''; currentCard=null;
  ['quick-error','purchase-error'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  startCamera();
}

document.getElementById('pin-input').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin();});
</script>
