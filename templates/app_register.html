<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Crear cuenta – ZubCard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f8f6f2 0%, #f0ebe3 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1714;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #c8a84b;
    }

    .subtitle {
      color: #888;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .step-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
    }

    .step {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: #eee;
      transition: background 0.3s;
    }

    .step.active {
      background: #1a1714;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
      margin-top: 12px;
    }

    input,
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }

    input:focus,
    select:focus {
      border-color: #1a1714;
    }

    .btn-primary {
      width: 100%;
      background: #1a1714;
      color: #FFF5B6;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-google {
      width: 100%;
      background: white;
      color: #333;
      border: 1.5px solid #e0e0e0;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-google:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .divider {
      text-align: center;
      color: #ccc;
      font-size: 0.8rem;
      margin: 12px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .error {
      background: #fff0f0;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
      border: 1px solid #f5c6c6;
    }

    .success-panel {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .success-panel h2 {
      color: #1a1714;
      margin-bottom: 8px;
    }

    .success-panel p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .link {
      text-align: center;
      font-size: 0.83rem;
      color: #888;
      margin-top: 16px;
    }

    .link a {
      color: #1a1714;
      font-weight: 600;
      text-decoration: none;
    }

    .pin-hint {
      font-size: 0.75rem;
      color: #999;
      margin-top: 3px;
    }

    .industry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .ind-btn {
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: center;
      font-size: 0.82rem;
      transition: all 0.2s;
      font-weight: 500;
    }

    .ind-btn:hover {
      border-color: #1a1714;
    }

    .ind-btn.selected {
      border-color: #1a1714;
      background: #1a1714;
      color: #FFF5B6;
    }

    .step-container {
      display: none;
    }

    .step-container.active {
      display: block;
    }

    p.industry-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Zub<span>Card</span></div>
    <div class="subtitle">Crea tu cuenta gratuita en 2 minutos</div>

    <div class="step-indicator">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
    </div>

    <!-- Step 1: Google or manual -->
    <div id="step1" class="step-container active">
      <button class="btn-google" onclick="googleRegister()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        </svg>
        Registrarse con Google
      </button>
      <div class="divider">o con email</div>

      <label>Nombre de tu negocio</label>
      <input type="text" id="biz-name" placeholder="Ej: Café Miramar, Sukie Cookie...">

      <label>Email</label>
      <input type="email" id="biz-email" placeholder="tu@negocio.com">

      <label>PIN de administrador</label>
      <input type="password" id="biz-pin" placeholder="4-6 dígitos" maxlength="6">
      <div class="pin-hint">Lo usarás para acceder al panel de administración</div>

      <button class="btn-primary" onclick="goStep2()">Siguiente →</button>
    </div>

    <!-- Step 2: Industry -->
    <div id="step2" class="step-container">
      <p class="industry-label">¿Qué tipo de negocio tienes?</p>
      <div class="industry-grid">
        <button class="ind-btn" onclick="selectIndustry('cafe', this)">☕ Cafetería</button>
        <button class="ind-btn" onclick="selectIndustry('bakery', this)">🍞 Panadería</button>
        <button class="ind-btn" onclick="selectIndustry('restaurant', this)">🍽️ Restaurante</button>
        <button class="ind-btn" onclick="selectIndustry('beauty', this)">💆 Belleza</button>
        <button class="ind-btn" onclick="selectIndustry('retail', this)">🛍️ Tienda</button>
        <button class="ind-btn" onclick="selectIndustry('other', this)">📦 Otro</button>
      </div>

      <button class="btn-primary" id="btnRegister" onclick="doRegister()">Crear mi cuenta →</button>
      <div class="error" id="err"></div>
    </div>

    <!-- Success -->
    <div id="successPanel" class="success-panel">
      <div class="success-icon">🎉</div>
      <h2>¡Cuenta creada!</h2>
      <p id="successMsg">Tu negocio está listo en ZubCard.</p>
      <button class="btn-primary" id="btnGoPanel" onclick="">Ir a mi panel →</button>
    </div>

    <div class="link" id="loginLink">¿Ya tienes cuenta? <a href="/app/login">Inicia sesión</a></div>
  </div>

  <script>
    let selectedIndustry = 'other';
    let dashboardUrl = '';

    function goStep2() {
      const name = document.getElementById('biz-name').value.trim();
      const email = document.getElementById('biz-email').value.trim();
      const pin = document.getElementById('biz-pin').value.trim();

      if (!name || !email || pin.length < 4) {
        alert('Completa nombre, email y PIN (mínimo 4 dígitos)');
        return;
      }

      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('s2').classList.add('active');
    }

    function selectIndustry(val, el) {
      selectedIndustry = val;
      document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function doRegister() {
      const btn = document.getElementById('btnRegister');
      const err = document.getElementById('err');
      btn.textContent = 'Creando cuenta...';
      btn.disabled = true;

      try {
        const r = await fetch('/api/app/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('biz-name').value.trim(),
            email: document.getElementById('biz-email').value.trim(),
            pin: document.getElementById('biz-pin').value.trim(),
            industry: selectedIndustry
          })
        });
        const d = await r.json();

        if (r.ok) {
          dashboardUrl = d.dashboard_url;
          document.getElementById('step2').classList.remove('active');
          document.getElementById('successPanel').style.display = 'block';
          document.getElementById('loginLink').style.display = 'none';
          document.getElementById('successMsg').textContent = `¡${d.name} está listo! Tu panel de administración te espera.`;
          document.getElementById('btnGoPanel').onclick = () => window.location.href = dashboardUrl;
        } else {
          err.textContent = d.detail || 'Error al crear cuenta';
          err.style.display = 'block';
          btn.textContent = 'Crear mi cuenta →';
          btn.disabled = false;
        }
      } catch (e) {
        err.textContent = 'Error de conexión: ' + e.message;
        err.style.display = 'block';
        btn.textContent = 'Crear mi cuenta →';
        btn.disabled = false;
      }
    }

    function googleRegister() {
      alert('Google OAuth estará disponible pronto. Por ahora usa email + PIN.');
    }
  </script>
</body>
</html>
