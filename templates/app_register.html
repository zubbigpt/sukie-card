<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Crear cuenta – ZubCard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: #fff8f5;
      --surface-low: #fff1ea;
      --surface-mid: #ffeade;
      --primary: #26170c;
      --primary-mid: #3d2b1f;
      --on-primary: #ffffff;
      --honey: #ffca48;
      --honey-dark: #785a00;
      --honey-light: #fff3d0;
      --outline: #a08d83;
      --outline-var: #e2cfc8;
      --red: #c62828;
      --r: 0.75rem;
      --r-sm: 0.375rem;
      --r-lg: 1.25rem;
      --shadow-sm: 0 2px 12px rgba(38,23,12,0.06);
      --shadow: 0 4px 24px rgba(38,23,12,0.10);
      --shadow-lg: 0 8px 40px rgba(38,23,12,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-mid) 100%);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .container {
      background: var(--on-primary);
      border-radius: var(--r-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
    }

    .brand {
      margin-bottom: 28px;
    }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      color: var(--primary);
      letter-spacing: .5px;
      line-height: 1;
    }
    .brand-logo span { color: var(--honey-dark); }

    .brand-sub {
      color: var(--outline);
      font-size: 0.85rem;
      margin-top: 4px;
      font-weight: 500;
    }

    .step-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
    }

    .step {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: var(--surface-mid);
      transition: background 0.3s;
    }
    .step.active { background: var(--honey); }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--outline);
      margin-bottom: 5px;
      margin-top: 14px;
    }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 0.93rem;
      outline: none;
      transition: box-shadow 0.18s;
      background: var(--surface);
      color: var(--primary);
      font-family: 'Manrope', sans-serif;
    }
    input:focus, select:focus {
      box-shadow: 0 0 0 2.5px var(--honey), var(--shadow-sm);
    }
    input::placeholder { color: var(--outline); }

    .pin-hint {
      font-size: 0.72rem;
      color: var(--outline);
      margin-top: 4px;
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      padding: 13px;
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: .5px;
      cursor: pointer;
      margin-top: 22px;
      transition: background 0.18s;
      font-family: 'Manrope', sans-serif;
    }
    .btn-primary:hover { background: var(--primary-mid); }
    .btn-primary:disabled { background: var(--outline); cursor: not-allowed; }

    .btn-google {
      width: 100%;
      background: var(--on-primary);
      color: var(--primary);
      border: none;
      box-shadow: inset 0 0 0 1.5px var(--outline-var);
      padding: 12px;
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: box-shadow 0.18s;
      margin-bottom: 16px;
      font-family: 'Manrope', sans-serif;
    }
    .btn-google:hover { box-shadow: inset 0 0 0 1.5px var(--outline), var(--shadow-sm); }

    .divider {
      text-align: center;
      color: var(--outline-var);
      font-size: 0.78rem;
      margin: 16px 0;
      position: relative;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--outline-var);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .error {
      background: #fbe9e7;
      color: var(--red);
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 0.83rem;
      margin-top: 14px;
      display: none;
      border-left: 3px solid var(--red);
    }

    .success-panel {
      text-align: center;
      padding: 24px 0;
      display: none;
    }
    .success-icon { font-size: 3.2rem; margin-bottom: 18px; }
    .success-panel h2 {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .success-panel p {
      color: var(--outline);
      font-size: 0.9rem;
      margin-bottom: 22px;
      line-height: 1.7;
    }

    .link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--outline);
      margin-top: 18px;
    }
    .link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .industry-label {
      font-size: 0.9rem;
      color: var(--outline);
      margin-bottom: 14px;
      margin-top: 4px;
      font-weight: 500;
    }

    .industry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .ind-btn {
      padding: 12px 10px;
      border: none;
      border-radius: var(--r-sm);
      background: var(--surface);
      cursor: pointer;
      text-align: center;
      font-size: 0.84rem;
      transition: all 0.18s;
      font-weight: 600;
      color: var(--primary);
      font-family: 'Manrope', sans-serif;
    }
    .ind-btn:hover { background: var(--honey-light); color: var(--honey-dark); }
    .ind-btn.selected {
      background: var(--honey);
      color: var(--honey-dark);
    }

    .step-container { display: none; }
    .step-container.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-logo">Zub<span>Card</span></div>
      <div class="brand-sub">Crea tu cuenta gratuita en 2 minutos</div>
    </div>

    <div class="step-indicator">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
    </div>

    <!-- Step 1: Google or manual -->
    <div id="step1" class="step-container active">
      <button class="btn-google" onclick="googleRegister()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Registrarse con Google
      </button>
      <div class="divider">o con email</div>

      <label>Nombre de tu negocio</label>
      <input type="text" id="biz-name" placeholder="Ej: Café Miramar, Sukie Cookie...">

      <label>Email</label>
      <input type="email" id="biz-email" placeholder="tu@negocio.com">

      <label>PIN de administrador</label>
      <input type="password" id="biz-pin" placeholder="4-6 dígitos" maxlength="6">
      <div class="pin-hint">Lo usarás para acceder al panel de administración</div>

      <button class="btn-primary" onclick="goStep2()">Siguiente →</button>
    </div>

    <!-- Step 2: Industry -->
    <div id="step2" class="step-container">
      <p class="industry-label">¿Qué tipo de negocio tienes?</p>
      <div class="industry-grid">
        <button class="ind-btn" onclick="selectIndustry('cafe', this)">☕ Cafetería</button>
        <button class="ind-btn" onclick="selectIndustry('bakery', this)">🍞 Panadería</button>
        <button class="ind-btn" onclick="selectIndustry('restaurant', this)">🍽️ Restaurante</button>
        <button class="ind-btn" onclick="selectIndustry('beauty', this)">💆 Belleza</button>
        <button class="ind-btn" onclick="selectIndustry('retail', this)">🛍️ Tienda</button>
        <button class="ind-btn" onclick="selectIndustry('other', this)">📦 Otro</button>
      </div>

      <button class="btn-primary" id="btnRegister" onclick="doRegister()">Crear mi cuenta →</button>
      <div class="error" id="err"></div>
    </div>

    <!-- Success -->
    <div id="successPanel" class="success-panel">
      <div class="success-icon">🎉</div>
      <h2>¡Cuenta creada!</h2>
      <p id="successMsg">Tu negocio está listo en ZubCard.</p>
      <button class="btn-primary" id="btnGoPanel" onclick="">Ir a mi panel →</button>
    </div>

    <div class="link" id="loginLink">¿Ya tienes cuenta? <a href="/app/login">Inicia sesión</a></div>
  </div>

  <script>
    let selectedIndustry = 'other';
    let dashboardUrl = '';

    function goStep2() {
      const name = document.getElementById('biz-name').value.trim();
      const email = document.getElementById('biz-email').value.trim();
      const pin = document.getElementById('biz-pin').value.trim();

      if (!name || !email || pin.length < 4) {
        alert('Completa nombre, email y PIN (mínimo 4 dígitos)');
        return;
      }

      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('s2').classList.add('active');
    }

    function selectIndustry(val, el) {
      selectedIndustry = val;
      document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function doRegister() {
      const btn = document.getElementById('btnRegister');
      const err = document.getElementById('err');
      btn.textContent = 'Creando cuenta...';
      btn.disabled = true;

      try {
        const r = await fetch('/api/app/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('biz-name').value.trim(),
            email: document.getElementById('biz-email').value.trim(),
            pin: document.getElementById('biz-pin').value.trim(),
            industry: selectedIndustry
          })
        });
        const d = await r.json();

        if (r.ok) {
          dashboardUrl = d.dashboard_url;
          document.getElementById('step2').classList.remove('active');
          document.getElementById('successPanel').style.display = 'block';
          document.getElementById('loginLink').style.display = 'none';
          document.getElementById('successMsg').textContent = `¡${d.name} está listo! Tu panel de administración te espera.`;
          document.getElementById('btnGoPanel').onclick = () => window.location.href = dashboardUrl;
        } else {
          err.textContent = d.detail || 'Error al crear cuenta';
          err.style.display = 'block';
          btn.textContent = 'Crear mi cuenta →';
          btn.disabled = false;
        }
      } catch (e) {
        err.textContent = 'Error de conexión: ' + e.message;
        err.style.display = 'block';
        btn.textContent = 'Crear mi cuenta →';
        btn.disabled = false;
      }
    }

    function googleRegister() {
      alert('Google OAuth estará disponible pronto. Por ahora usa email + PIN.');
    }
  </script>
</body>
</html>
