<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Sukie Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FFF3CF;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(58,52,38,0.13);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo { height: 60px; margin-bottom: 20px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #3A3426;
      margin-bottom: 6px;
    }
    p { color: #9a8f7e; font-size: 14px; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e8d9a0;
      border-radius: 12px;
      font-size: 22px;
      text-align: center;
      letter-spacing: 6px;
      font-family: 'Nunito', sans-serif;
      color: #3A3426;
      background: #FFF3CF;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #3A3426; }
    button {
      width: 100%;
      padding: 16px;
      background: #3A3426;
      color: #FFF3CF;
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="card">
  <img class="logo"
       src="https://cdn.shopify.com/s/files/1/0942/2743/1749/files/SukieCookie_x320.png?v=1743690314"
       alt="Sukie Cookie">
  <h1>Panel Admin</h1>
  <p>Introduce el PIN para ver todos los clientes</p>
  <form action="/admin" method="get">
    <input type="password" name="pin" placeholder="••••" maxlength="8" autofocus>
    <button type="submit">Entrar 🍪</button>
  </form>
</div>
</body>
</html>
