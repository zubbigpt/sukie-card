<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubCard — Panel de Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: #26170c;
      --brown-mid: #3d2510;
      --honey: #ffca48;
      --honey-light: #fff5b6;
      --cream: #fdf8f0;
      --white: #ffffff;
      --red: #c0392b;
      --green: #1a7a4a;
      --gray: #888;
      --border: #e8ddd0;
    }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(38,23,12,.07);
    }
    .login-logo {
      width: 72px; height: 72px;
      background: var(--honey);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-family: 'Epilogue', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      color: var(--brown);
    }
    .login-card h1 {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      margin-bottom: 4px;
    }
    .login-card p { color: var(--gray); font-size: .88rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; text-align: left; }
    .form-group label { font-size: .78rem; font-weight: 700; color: var(--brown); letter-spacing: .05em; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Manrope', sans-serif;
      background: var(--cream);
      color: var(--brown);
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--honey); box-shadow: 0 0 0 3px rgba(255,202,72,.15); }
    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--brown); color: #fff;
      border: none; border-radius: 8px;
      font-size: .82rem; font-weight: 800;
      font-family: 'Manrope', sans-serif;
      letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
      margin-top: 6px;
    }
    .btn-primary:hover { background: var(--brown-mid); }
    .login-err { color: var(--red); font-size: .84rem; margin-top: 12px; min-height: 18px; }

    /* ── DASHBOARD ── */
    #dashboard-view { display: none; }

    .topbar {
      background: var(--brown);
      color: #fff;
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-brand .logo-dot {
      width: 32px; height: 32px;
      background: var(--honey);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Epilogue', sans-serif;
      font-size: .95rem; font-weight: 900;
      color: var(--brown);
    }
    .topbar-brand span {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: .02em;
    }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-right .badge {
      background: var(--honey);
      color: var(--brown);
      font-size: .72rem; font-weight: 800;
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: .06em;
    }
    .btn-logout {
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: .78rem; font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer; transition: background .2s;
      text-decoration: none;
    }
    .btn-logout:hover { background: rgba(255,255,255,.2); }

    .main-content { padding: 32px 28px; max-width: 1100px; margin: 0 auto; }
    .page-title {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      margin-bottom: 6px;
    }
    .page-sub { color: var(--gray); font-size: .88rem; margin-bottom: 28px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-box .stat-val {
      font-family: 'Epilogue', sans-serif;
      font-size: 2rem; font-weight: 900;
      color: var(--brown);
    }
    .stat-box .stat-label {
      font-size: .78rem; font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 2px;
    }

    .biz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .biz-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow .2s, border-color .2s;
    }
    .biz-card:hover { box-shadow: 0 4px 20px rgba(38,23,12,.09); border-color: var(--honey); }

    .biz-header { display: flex; align-items: center; gap: 12px; }
    .biz-avatar {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--honey-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Epilogue', sans-serif;
      font-size: 1.2rem; font-weight: 900;
      color: var(--brown);
      flex-shrink: 0;
      overflow: hidden;
    }
    .biz-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .biz-info { flex: 1; min-width: 0; }
    .biz-name {
      font-family: 'Epilogue', sans-serif;
      font-weight: 800; font-size: 1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .biz-email { font-size: .78rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .plan-badge {
      font-size: .7rem; font-weight: 800;
      padding: 2px 8px; border-radius: 20px;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .plan-pro { background: #e8f5e9; color: #1a7a4a; }
    .plan-free { background: #f5f5f5; color: #888; }

    .biz-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .mini-stat {
      background: var(--cream);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }
    .mini-stat .val { font-size: .95rem; font-weight: 800; color: var(--brown); }
    .mini-stat .lbl { font-size: .68rem; color: var(--gray); font-weight: 600; }

    .biz-actions { display: flex; gap: 8px; }
    .btn-access {
      flex: 1;
      background: var(--brown);
      color: #fff;
      border: none; border-radius: 8px;
      padding: 10px;
      font-size: .78rem; font-weight: 800;
      font-family: 'Manrope', sans-serif;
      letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; text-align: center;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .2s;
    }
    .btn-access:hover { background: var(--brown-mid); }
    .btn-view {
      background: var(--honey-light);
      color: var(--brown);
      border: none; border-radius: 8px;
      padding: 10px 12px;
      font-size: .78rem; font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .btn-view:hover { background: #ffeea0; }

    .biz-since { font-size: .74rem; color: #aaa; }

    /* search */
    .search-wrap { margin-bottom: 20px; }
    .search-wrap input {
      width: 100%; max-width: 360px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Manrope', sans-serif;
      font-size: .9rem;
      background: var(--white);
      color: var(--brown);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--honey); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
      font-size: .9rem;
    }

    @media (max-width: 600px) {
      .main-content { padding: 20px 16px; }
      .topbar { padding: 0 16px; }
      .biz-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN VIEW ── -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">Z</div>
    <h1>ZubCard Admin</h1>
    <p>Panel de control exclusivo para el equipo ZubCard</p>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="f-user" placeholder="usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label>PIN</label>
      <input type="password" id="f-pin" placeholder="••••" autocomplete="current-password" maxlength="8">
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar al panel</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── DASHBOARD VIEW ── -->
<div id="dashboard-view">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-dot">Z</div>
      <span>ZubCard Admin</span>
    </div>
    <div class="topbar-right">
      <span class="badge">SUPER ADMIN</span>
      <a href="/zubadmin/logout" class="btn-logout">Cerrar sesión</a>
    </div>
  </div>

  <div class="main-content">
    <div class="page-title">Negocios afiliados</div>
    <div class="page-sub" id="page-sub">Cargando...</div>

    <div class="stats-row" id="stats-row">
      <div class="stat-box"><div class="stat-val" id="st-total">—</div><div class="stat-label">Negocios</div></div>
      <div class="stat-box"><div class="stat-val" id="st-pro">—</div><div class="stat-label">Plan Pro</div></div>
      <div class="stat-box"><div class="stat-val" id="st-free">—</div><div class="stat-label">Plan Free</div></div>
      <div class="stat-box"><div class="stat-val" id="st-clients">—</div><div class="stat-label">Clientes totales</div></div>
    </div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar negocio..." oninput="filterBiz()">
    </div>

    <div class="biz-grid" id="biz-grid">
      <div class="empty-state">Cargando negocios...</div>
    </div>
  </div>
</div>

<script>
const BASE = '';

// ── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('f-user').value.trim();
  const pin  = document.getElementById('f-pin').value.trim();
  const err  = document.getElementById('login-err');
  err.textContent = '';
  if (!user || !pin) { err.textContent = 'Introduce usuario y PIN'; return; }
  try {
    const r = await fetch('/api/zubadmin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user, pin }),
      credentials: 'same-origin'
    });
    if (r.status === 403) { err.textContent = 'Usuario o PIN incorrecto'; return; }
    if (!r.ok) { err.textContent = 'Error al iniciar sesión'; return; }
    showDashboard();
  } catch(e) {
    err.textContent = 'Error de conexión';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-view').style.display !== 'none') doLogin();
  }
});

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
let allBiz = [];

async function showDashboard() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('dashboard-view').style.display = 'block';
  await loadBiz();
}

async function loadBiz() {
  try {
    const r = await fetch('/api/zubadmin/businesses', { credentials: 'same-origin' });
    if (r.status === 403) {
      // Cookie expired, back to login
      document.getElementById('login-view').style.display = 'flex';
      document.getElementById('dashboard-view').style.display = 'none';
      return;
    }
    allBiz = await r.json();
    renderBiz(allBiz);

    // Stats
    const pro   = allBiz.filter(b => b.plan === 'pro').length;
    const free  = allBiz.length - pro;
    const total_clients = allBiz.reduce((s, b) => s + (b.customers || 0), 0);
    document.getElementById('st-total').textContent   = allBiz.length;
    document.getElementById('st-pro').textContent     = pro;
    document.getElementById('st-free').textContent    = free;
    document.getElementById('st-clients').textContent = total_clients;
    document.getElementById('page-sub').textContent   = `${allBiz.length} negocio${allBiz.length !== 1 ? 's' : ''} registrado${allBiz.length !== 1 ? 's' : ''}`;
  } catch(e) {
    document.getElementById('biz-grid').innerHTML = '<div class="empty-state">Error al cargar negocios</div>';
  }
}

function renderBiz(list) {
  const grid = document.getElementById('biz-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">No hay negocios que coincidan</div>';
    return;
  }
  grid.innerHTML = list.map(b => {
    const initial = (b.name || '?')[0].toUpperCase();
    const avatarInner = b.logo_url
      ? `<img src="${b.logo_url}" alt="${b.name}" onerror="this.parentElement.textContent='${initial}'">`
      : initial;
    const planClass = b.plan === 'pro' ? 'plan-pro' : 'plan-free';
    const planLabel = b.plan === 'pro' ? 'PRO' : 'FREE';
    const since = b.created_at ? new Date(b.created_at).toLocaleDateString('es-ES', {day:'2-digit',month:'short',year:'numeric'}) : '—';
    return `
      <div class="biz-card">
        <div class="biz-header">
          <div class="biz-avatar">${avatarInner}</div>
          <div class="biz-info">
            <div class="biz-name">${b.name}</div>
            <div class="biz-email">${b.email}</div>
          </div>
          <span class="plan-badge ${planClass}">${planLabel}</span>
        </div>
        <div class="biz-stats">
          <div class="mini-stat">
            <div class="val">${b.customers ?? '—'}</div>
            <div class="lbl">Clientes</div>
          </div>
          <div class="mini-stat">
            <div class="val">${b.stamps_given ?? '—'}</div>
            <div class="lbl">Sellos</div>
          </div>
          <div class="mini-stat">
            <div class="val">${b.rewards ?? '—'}</div>
            <div class="lbl">Premios</div>
          </div>
        </div>
        <div class="biz-actions">
          <a class="btn-access" href="/zubadmin/access/${b.slug}">
            ⚡ Acceder al dashboard
          </a>
          <a class="btn-view" href="/biz/${b.slug}/register" target="_blank" title="Ver landing de registro">↗</a>
        </div>
        <div class="biz-since">Registrado: ${since} · /biz/${b.slug}</div>
      </div>
    `;
  }).join('');
}

function filterBiz() {
  const q = document.getElementById('search-input').value.toLowerCase();
  if (!q) { renderBiz(allBiz); return; }
  renderBiz(allBiz.filter(b =>
    (b.name || '').toLowerCase().includes(q) ||
    (b.slug || '').toLowerCase().includes(q) ||
    (b.email || '').toLowerCase().includes(q)
  ));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  // Check if already authenticated
  try {
    const r = await fetch('/api/zubadmin/businesses', { credentials: 'same-origin' });
    if (r.ok) {
      showDashboard();
    } else {
      document.getElementById('login-view').style.display = 'flex';
    }
  } catch(e) {
    document.getElementById('login-view').style.display = 'flex';
  }
})();
</script>
</body>
</html>
